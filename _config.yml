# Site metadata
title: Alexis Creuzot
description: >-
  Personal website of Alexis Creuzot, iOS developer, co-founder of Monoqle
  and Happy Hours Coworking
lang: en
url: https://alexiscreuzot.com
baseurl: ""
timezone: UTC
encoding: utf-8

# Build output (Jekyll default; served by Vercel after build)
destination: _site

# Sass
sass:
  style: compressed
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin

# Do not publish source or tooling in the static output
exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - vercel.json
  - .bundle
  - .tool-versions
  - .ruby-version
  - .gitignore
  - node_modules
